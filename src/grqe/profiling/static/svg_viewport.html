<!DOCTYPE html>
<html>
<head>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #FFF;
    }

    #container {
      width: 100vw;
      height: 100vh;
    }

    svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="container">
    {{svg|safe}}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/svg-pan-zoom@3.6.1/dist/svg-pan-zoom.min.js"></script>
  <script>
    svgPanZoom('#container > svg', {
      zoomEnabled: true,
      controlIconsEnabled: false,
      fit: true,
      center: true,
      minZoom: 0.5,
      maxZoom: 10,
      zoomScaleSensitivity: 0.25,
    });
  </script>
</body>
</html>
