<html>
<style>
    table {
        border: 1px solid black;
    }

    tr {
        border: 1px solid black;
    }

    td {
        padding: 0.4em 5em;
    }
</style>
<body>
<table>
    <tbody>
    <tr>
        <td><b>Query</b></td>
        <td><b>Date</b></td>
        <td><b>Link</b></td>
    </tr>

    {% for query, date, id in queries %}
    <tr>
        <td>
            <pre><code>{{query}}</code></pre>
        </td>
        <td>{{date}}</td>
        <td><a href="/traces/{{id}}">Show</a></td>
    </tr>
    {% endfor %}
    </tbody>
</table>
</body>
</html>
